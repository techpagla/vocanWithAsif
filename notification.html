<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Notification — VocabFlash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Bengali&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0e17; --surface:#1a1929; --border:rgba(255,255,255,0.08);
    --text:#fffffe; --muted:#a7a9be; --soft:rgba(255,255,255,0.05);
    --accent:#e8b86d; --accent2:#7c6aff; --accent3:#ff6b6b; --green:#6bffb8;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ── TOP BAR ── */
  .topbar {
    position:sticky; top:0; z-index:100;
    background:rgba(15,14,23,0.92); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:12px 20px; display:flex; align-items:center; gap:12px;
  }
  .back-btn {
    width:36px; height:36px; border-radius:50%;
    background:var(--soft); border:none; color:var(--text);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background 0.15s;
  }
  .back-btn:hover { background:rgba(124,106,255,0.2); }
  .topbar-title {
    font-size:0.9rem; font-weight:600; color:var(--text);
    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .topbar-logo {
    font-family:'Playfair Display',serif; font-size:0.95rem;
    color:var(--accent2); flex-shrink:0;
  }

  /* ── LOADING ── */
  .loading-screen {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:80vh; gap:16px; color:var(--muted);
  }
  .spinner {
    width:36px; height:36px; border-radius:50%;
    border:3px solid var(--border); border-top-color:var(--accent2);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── ERROR ── */
  .error-screen {
    display:none; flex-direction:column; align-items:center;
    justify-content:center; min-height:80vh; gap:12px;
    text-align:center; padding:32px;
  }
  .error-icon { font-size:3rem; }
  .error-title { font-size:1.1rem; font-weight:700; color:var(--text); }
  .error-sub { font-size:0.82rem; color:var(--muted); line-height:1.5; }

  /* ── NOTIFICATION CONTENT ── */
  #notif-content { display:none; max-width:620px; margin:0 auto; }

  /* Hero section */
  .notif-hero {
    padding:28px 20px 20px;
    border-bottom:1px solid var(--border);
  }
  .notif-type-badge {
    display:inline-flex; align-items:center; gap:6px;
    border-radius:20px; padding:5px 12px; font-size:0.7rem;
    font-weight:700; letter-spacing:1px; text-transform:uppercase;
    margin-bottom:14px;
  }
  .notif-title {
    font-family:'Playfair Display',serif; font-size:1.6rem;
    font-weight:700; color:var(--text); line-height:1.3;
    margin-bottom:10px;
  }
  .notif-meta {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .notif-meta-item {
    display:flex; align-items:center; gap:5px;
    font-size:0.72rem; color:var(--muted);
  }
  .priority-badge {
    font-size:0.65rem; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; padding:3px 9px; border-radius:20px;
  }

  /* ── TEXT TYPE ── */
  .notif-body-text {
    padding:24px 20px;
    font-size:0.95rem; color:var(--text); line-height:1.8;
    white-space:pre-wrap;
  }

  /* ── IMAGE TYPE ── */
  .notif-image-wrap {
    position:relative; background:#000;
    max-height:75vw; overflow:hidden;
  }
  .notif-image-wrap img {
    width:100%; max-height:500px; object-fit:contain;
    display:block; cursor:zoom-in;
  }
  .notif-image-caption {
    padding:12px 20px; font-size:0.82rem; color:var(--muted);
    font-style:italic; border-bottom:1px solid var(--border);
  }
  .notif-image-actions {
    padding:16px 20px; display:flex; gap:10px; flex-wrap:wrap;
  }

  /* ── FILE TYPE ── */
  .notif-file-card {
    margin:20px; background:var(--surface);
    border:1px solid var(--border); border-radius:16px;
    overflow:hidden;
  }
  .notif-file-header {
    display:flex; align-items:center; gap:14px; padding:18px 20px;
    border-bottom:1px solid var(--border);
  }
  .file-icon-big {
    width:52px; height:52px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; flex-shrink:0;
    background:linear-gradient(135deg,rgba(255,107,107,0.2),rgba(255,107,107,0.05));
  }
  .file-name { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:3px; }
  .file-size { font-size:0.75rem; color:var(--muted); }
  .notif-file-desc {
    padding:14px 20px; font-size:0.88rem; color:var(--muted);
    line-height:1.6; border-bottom:1px solid var(--border);
  }
  .notif-file-actions { padding:16px 20px; display:flex; gap:10px; flex-wrap:wrap; }

  /* PDF VIEWER */
  .pdf-viewer-wrap {
    margin:0 20px 20px;
    border:1px solid var(--border); border-radius:14px; overflow:hidden;
    background:#1a1a2e;
  }
  .pdf-viewer-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .pdf-viewer-bar span { font-size:0.78rem; color:var(--muted); }
  .pdf-iframe {
    width:100%; height:70vh; border:none; display:block;
    background:#fff;
  }

  /* ── LINK TYPE ── */
  .notif-link-section { padding:20px; }
  .link-preview-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:18px 20px; margin-bottom:16px;
  }
  .link-url-display {
    font-size:0.8rem; color:var(--accent2); word-break:break-all;
    line-height:1.5; margin-bottom:4px;
  }
  .link-desc { font-size:0.88rem; color:var(--text); line-height:1.6; }

  /* ── ACTION BUTTONS ── */
  .action-btn {
    display:inline-flex; align-items:center; gap:8px;
    border-radius:12px; padding:11px 20px;
    font-family:'DM Sans',sans-serif; font-size:0.85rem;
    font-weight:600; cursor:pointer; border:none;
    transition:all 0.18s; text-decoration:none;
  }
  .action-btn-primary {
    background:linear-gradient(135deg,var(--accent2),#9c7aff);
    color:#fff; box-shadow:0 4px 16px rgba(124,106,255,0.3);
  }
  .action-btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(124,106,255,0.4); }
  .action-btn-ghost {
    background:var(--soft); color:var(--text);
    border:1px solid var(--border) !important;
  }
  .action-btn-ghost:hover { background:rgba(255,255,255,0.08); border:none; }
  .action-btn-green {
    background:linear-gradient(135deg,rgba(107,255,184,0.15),rgba(107,255,184,0.05));
    color:var(--green); border:1px solid rgba(107,255,184,0.3) !important;
  }
  .action-btn-danger {
    background:rgba(255,107,107,0.1); color:var(--accent3);
    border:1px solid rgba(255,107,107,0.25) !important;
  }

  /* ── FULLSCREEN LIGHTBOX ── */
  #lightbox {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95);
    z-index:999; align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
  }
  #lightbox.open { display:flex; }
  #lightbox img {
    max-width:96vw; max-height:86vh; object-fit:contain;
    border-radius:6px; cursor:zoom-out;
  }
  .lightbox-close {
    position:fixed; top:16px; right:16px;
    background:rgba(255,255,255,0.12); border:none; color:#fff;
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  }
  #lightbox-dl {
    background:rgba(255,255,255,0.1); color:#fff;
    border:1px solid rgba(255,255,255,0.2); border-radius:20px;
    padding:8px 20px; font-size:0.8rem; cursor:pointer;
    font-family:'DM Sans',sans-serif; text-decoration:none;
    display:inline-flex; align-items:center; gap:7px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="goBack()">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
    </svg>
  </button>
  <div class="topbar-title" id="topbar-title">Notification</div>
  <div class="topbar-logo">VocabFlash</div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:0.82rem;color:var(--muted);">Loading notification...</div>
</div>

<!-- ERROR -->
<div class="error-screen" id="error-screen">
  <div class="error-icon">🔍</div>
  <div class="error-title">Notification not found</div>
  <div class="error-sub">This notification may have been deleted or the link is invalid.</div>
  <button class="action-btn action-btn-primary" onclick="goBack()" style="margin-top:8px;">
    ← Go Back
  </button>
</div>

<!-- NOTIFICATION CONTENT -->
<div id="notif-content"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <a id="lightbox-dl" href="" download="" onclick="event.stopPropagation()">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
    </svg>
    Download Image
  </a>
</div>

<script>
const PUBLIC_NOTIF_URL = 'https://raw.githubusercontent.com/techpagla/vocanWithAsif/main/notifications.json';

function goBack() {
  if (document.referrer && document.referrer.includes(location.hostname)) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(d) {
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)    return 'Just now';
  if (diff < 3600)  return Math.floor(diff/60) + ' min ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hours ago';
  if (diff < 604800)return Math.floor(diff/86400) + ' days ago';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}

function getFileEmoji(name) {
  if (!name) return '📄';
  const ext = (name.split('.').pop()||'').toLowerCase();
  return {pdf:'📕',doc:'📘',docx:'📘',ppt:'📙',pptx:'📙',xls:'📗',xlsx:'📗',zip:'🗜️',txt:'📃',mp4:'🎬',mp3:'🎵'}[ext] || '📄';
}

function formatSize(bytes) {
  if (!bytes) return '';
  return bytes > 1048576 ? (bytes/1048576).toFixed(1)+' MB' : Math.floor(bytes/1024)+' KB';
}

function openLightbox(src, filename) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-dl').href = src;
  document.getElementById('lightbox-dl').download = filename || 'image.jpg';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function downloadFile(data, filename) {
  const a = document.createElement('a');
  a.href = data; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => document.body.removeChild(a), 200);
}

const priColors = { info:'#7c6aff', important:'#e8b86d', urgent:'#ff6b6b' };
const priLabels = { info:'Info', important:'Important', urgent:'Urgent' };
const typeLabels = { text:'Message', image:'Photo', file:'File', link:'Link' };
const typeSvg = {
  text: '<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z" clip-rule="evenodd"/></svg>',
  image:'<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg>',
  file: '<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>',
  link: '<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/></svg>'
};

function renderNotification(n) {
  const d = new Date(n.timestamp);
  const pri = n.priority || 'info';
  const priColor = priColors[pri] || '#7c6aff';
  const typeLabel = typeLabels[n.type] || 'Notification';

  // Update page title
  document.title = n.title + ' — VocabFlash';
  document.getElementById('topbar-title').textContent = n.title;

  let contentHtml = '';

  // ── HERO ──
  contentHtml += `
    <div class="notif-hero">
      <div class="notif-type-badge" style="background:${priColor}18;color:${priColor};border:1px solid ${priColor}33;">
        ${typeSvg[n.type] || ''} ${typeLabel}
      </div>
      <div class="notif-title">${esc(n.title)}</div>
      <div class="notif-meta">
        <div class="notif-meta-item">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
          Admin
        </div>
        <div class="notif-meta-item">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
          ${timeAgo(d)}
        </div>
        <span class="priority-badge" style="background:${priColor}18;color:${priColor};border:1px solid ${priColor}33;">${priLabels[pri]}</span>
      </div>
    </div>`;

  // ── TYPE-SPECIFIC CONTENT ──
  if (n.type === 'text') {
    contentHtml += `<div class="notif-body-text">${esc(n.body || '')}</div>`;

  } else if (n.type === 'image' && n.imageData) {
    contentHtml += `
      <div class="notif-image-wrap">
        <img src="${n.imageData}" alt="${esc(n.imageName||'Image')}"
          onclick="openLightbox('${n.imageData}','${esc(n.imageName||'image.jpg')}')">
      </div>
      ${n.caption ? `<div class="notif-image-caption">${esc(n.caption)}</div>` : ''}
      <div class="notif-image-actions">
        <button class="action-btn action-btn-primary" onclick="openLightbox('${n.imageData}','${esc(n.imageName||'image.jpg')}')">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
          View Full Screen
        </button>
        <button class="action-btn action-btn-ghost" onclick="downloadFile('${n.imageData}','${esc(n.imageName||'image.jpg')}')">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          Save Image
        </button>
      </div>`;

  } else if (n.type === 'file' && n.fileData) {
    const isPDF = n.fileMime && n.fileMime.includes('pdf');
    contentHtml += `
      <div class="notif-file-card">
        <div class="notif-file-header">
          <div class="file-icon-big">${getFileEmoji(n.fileName)}</div>
          <div>
            <div class="file-name">${esc(n.fileName||'File')}</div>
            <div class="file-size">${formatSize(n.fileSize)}</div>
          </div>
        </div>
        ${n.desc ? `<div class="notif-file-desc">${esc(n.desc)}</div>` : ''}
        <div class="notif-file-actions">
          <button class="action-btn action-btn-primary" onclick="downloadFile('${n.fileData}','${esc(n.fileName||'file')}')">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            Download File
          </button>
          ${isPDF ? `<button class="action-btn action-btn-danger" onclick="document.getElementById('pdf-section').style.display='block';this.style.display='none'">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.396 0 2.696.411 3.75 1.115A7.968 7.968 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.969 7.969 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
            Open PDF Viewer
          </button>` : ''}
        </div>
      </div>
      ${isPDF ? `
      <div id="pdf-section" class="pdf-viewer-wrap" style="display:none;">
        <div class="pdf-viewer-bar">
          <span>${esc(n.fileName||'PDF Document')}</span>
          <button class="action-btn action-btn-ghost" style="padding:5px 12px;font-size:0.72rem;" onclick="downloadFile('${n.fileData}','${esc(n.fileName||'file.pdf')}')">Download</button>
        </div>
        <iframe class="pdf-iframe" src="${n.fileData}" title="${esc(n.fileName||'PDF')}"></iframe>
      </div>` : ''}`;

  } else if (n.type === 'link' && n.url) {
    contentHtml += `
      <div class="notif-link-section">
        <div class="link-preview-card">
          ${n.desc ? `<div class="link-desc" style="margin-bottom:10px;">${esc(n.desc)}</div>` : ''}
          <div class="link-url-display">
            <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" style="vertical-align:middle;margin-right:4px;"><path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/></svg>
            ${esc(n.url)}
          </div>
        </div>
        <a class="action-btn action-btn-green" href="${n.url}" target="_blank" rel="noopener" style="display:inline-flex;">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
          Open Link
        </a>
      </div>`;
  }

  contentHtml += `
    <div style="padding:20px;border-top:1px solid var(--border);margin-top:8px;">
      <button class="action-btn action-btn-ghost" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
        Back to Notifications
      </button>
    </div>`;

  document.getElementById('notif-content').innerHTML = contentHtml;
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('notif-content').style.display = 'block';
}

async function loadNotification() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }

  try {
    const resp = await fetch(PUBLIC_NOTIF_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('fetch failed');
    const notifs = await resp.json();
    const n = notifs.find(x => x.id === id);
    if (!n) throw new Error('not found');

    // Mark as read in localStorage
    try {
      const readKey = 'vf_read_ids';
      const read = JSON.parse(localStorage.getItem(readKey) || '[]');
      if (!read.includes(id)) { read.push(id); localStorage.setItem(readKey, JSON.stringify(read)); }
    } catch(e) {}

    renderNotification(n);
  } catch(e) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
  }
}

loadNotification();
</script>
